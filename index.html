<!DOCTYPE html>
<html>
<head>
<title>Countdown Timer</title>

<style>
body{
font-family: Arial;
text-align:center;
margin-top:120px;
background:#f4f4f4;
}

#time{
font-size:60px;
margin-bottom:25px;
}

button{
font-size:18px;
padding:12px 18px;
margin:6px;
border-radius:6px;
cursor:pointer;
}
</style>

</head>

<body>

<h1>Countdown Timer</h1>

<div id="time">05:00</div>

<button onclick="startTimer()">Start</button>
<button onclick="pauseTimer()">Pause</button>
<button onclick="resetTimer()">Reset</button>

<br><br>

<button onclick="setTimer(300)">5 Min</button>
<button onclick="setTimer(600)">10 Min</button>
<button onclick="setTimer(900)">15 Min</button>

<script>

let seconds = 300
let timer = null

function updateDisplay(){
let min = Math.floor(seconds/60)
let sec = seconds % 60

min = min < 10 ? "0"+min : min
sec = sec < 10 ? "0"+sec : sec

document.getElementById("time").innerText = min + ":" + sec
}

function startTimer(){
if(timer) return

timer = setInterval(()=>{
if(seconds > 0){
seconds--
updateDisplay()
}
},1000)
}

function pauseTimer(){
clearInterval(timer)
timer = null
}

function resetTimer(){
pauseTimer()
seconds = 300
updateDisplay()
}

function setTimer(sec){
seconds = sec
updateDisplay()
}

updateDisplay()

</script>

</body>
</html>
